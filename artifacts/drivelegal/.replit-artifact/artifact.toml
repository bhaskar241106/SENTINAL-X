kind = "web"
previewPath = "/"
title = "DriveLegal BIMSTEC AI"
version = "1.0.0"
id = "artifacts/drivelegal"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19480

[services.development]
run = "pnpm --filter @workspace/drivelegal run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/drivelegal", "run", "build" ]
publicDir = "artifacts/drivelegal/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19480"
BASE_PATH = "/"
